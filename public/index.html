<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interview AI Observer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f0f11; color: #e2e2e2; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { padding: 12px 24px; border-bottom: 1px solid #2a2a2e; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 15px; font-weight: 600; color: #fff; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
.dot.live { background: #22c55e; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.main { display: grid; grid-template-columns: 1fr 320px; flex: 1; overflow: hidden; }
.camera-section { background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
.cam-inner { position: relative; width: 95%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a2e; }
canvas#outputCanvas { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); display: block; }
.placeholder { position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#888; text-align:center; z-index: 5; font-size: 14px;}
.overlay-badges { position:absolute; top:12px; left:12px; display:flex; flex-direction:column; gap:6px; z-index:10; }
.badge { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:6px; font-size:11px; font-weight:600; background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.1); }
.badge .dot2 { width:6px; height:6px; border-radius:50%; background:#555; }
.badge.good .dot2 { background:#22c55e; }
.badge.warn .dot2 { background:#f59e0b; }
.badge.bad  .dot2 { background:#ef4444; }
.side-panel { border-left:1px solid #2a2a2e; display:flex; flex-direction:column; overflow-y:auto; background:#141416; }
.panel-section { padding:16px; border-bottom:1px solid #1e1e22; }
.panel-section h3 { font-size:10px; font-weight:700; text-transform:uppercase; color:#555; margin-bottom:12px; }
.metric-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #1a1a1e; font-size:12px; }
.metric-value { font-weight:600; font-family: monospace; }
.metric-value.good { color:#22c55e; }
.metric-value.warn { color:#f59e0b; }
.metric-value.bad  { color:#ef4444; }
.bar-track { height:4px; background:#252528; border-radius:2px; margin:4px 0 12px; }
.bar-fill { height:100%; background:#22c55e; transition: width 0.3s; }
button { width:100%; padding:10px; border-radius:6px; border:none; background:#1e1e22; color:#fff; font-weight:600; cursor:pointer; margin-bottom:6px; transition: 0.2s; }
button:hover:not(:disabled) { background: #2a2a30; }
button.primary { background:#2563eb; }
button.primary:hover:not(:disabled) { background:#1d4ed8; }
button:disabled { opacity:0.3; cursor:not-allowed; }
.event-log { max-height:100px; overflow-y:auto; font-size:11px; color:#888; line-height: 1.5; }
.event-log span.time { color: #555; margin-right: 4px; }
.report-box { background:#000; padding:10px; border-radius:4px; font-size:12px; margin-top:10px; display:none; color: #ddd; line-height: 1.6; border: 1px solid #333;}
.report-box strong { color: #fff; display: block; margin-top: 8px; margin-bottom: 4px; color: #a78bfa;}
</style>
</head>
<body>

<video id="hiddenVideo" autoplay muted playsinline style="display:none;"></video>

<header>
  <div class="dot" id="liveDot"></div>
  <h1>Interview AI Observer</h1>
  <span id="statusText" style="margin-left:auto; font-size:12px; color:#888;">Ready to start</span>
</header>

<div class="main">
  <div class="camera-section">
    <div class="cam-inner">
      <div class="placeholder" id="placeholder">Camera feed will appear here</div>
      <canvas id="outputCanvas"></canvas>
      <div class="overlay-badges" id="overlayBadges" style="display:none">
        <div class="badge" id="badgeEye"><div class="dot2"></div><span id="badgeEyeTxt">Eye Focus</span></div>
        <div class="badge" id="badgeHead"><div class="dot2"></div><span id="badgeHeadTxt">Head Pose</span></div>
        <div class="badge" id="badgeHand"><div class="dot2"></div><span id="badgeHandTxt">Hands</span></div>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-section">
      <h3 id="timer" style="font-size: 24px; color: #fff; text-align: center; font-variant-numeric: tabular-nums;">00:00</h3>
      <button class="primary" id="btnStart" onclick="startSession()">Start Tracking</button>
      <button id="btnStop" disabled onclick="stopSession()">Stop Session</button>
    </div>
    
    <div class="panel-section">
      <h3>Live Analysis</h3>
      <div class="metric-row"><span>Gaze Deviation</span><span class="metric-value" id="mEye">-</span></div>
      <div class="metric-row"><span>Head Rotation</span><span class="metric-value" id="mYaw">-</span></div>
      <div class="metric-row"><span>Hand Stability</span><span class="metric-value" id="mHand">-</span></div>
      <div class="metric-row"><span>Look-aways</span><span class="metric-value" id="mLookaway">0</span></div>
    </div>

    <div class="panel-section">
      <h3>Session Totals</h3>
      <div style="font-size:11px; color:#aaa; margin-bottom: 2px;">Focus Score</div>
      <div class="bar-track"><div class="bar-fill" id="barEye" style="width:0%"></div></div>
      <div style="font-size:11px; color:#aaa; margin-bottom: 2px;">Posture Score</div>
      <div class="bar-track"><div class="bar-fill" id="barHead" style="width:0%"></div></div>
      <div style="font-size:11px; color:#aaa; margin-bottom: 2px;">Hand Stability</div>
      <div class="bar-track"><div class="bar-fill" id="barHand" style="width:0%"></div></div>
    </div>

    <div class="panel-section">
      <h3>Event Log</h3>
      <div class="event-log" id="eventLog">Waiting for session...</div>
    </div>

    <div class="panel-section">
      <h3>AI Report</h3>
      <button onclick="generateReport()" id="btnReport" disabled>Generate AI Feedback</button>
      <div class="report-box" id="reportBox"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const SENSITIVITY = { gaze: 0.13, yaw: 20.0, pitch: 18.0, handSpeedAllowed: 25.0 };

const video = document.getElementById('hiddenVideo');
const canvas = document.getElementById('outputCanvas');
const ctx = canvas.getContext('2d');

let sessionActive = false;
let sessionStart = null;
let animationId = null;
let aiProcessingInterval = null;

let currentFaceLandmarks = null;
let currentHandLandmarks = null;
let stats = { totalFrames:0, eyeOk:0, headOk:0, handOk:0, lookaways:0, lastEyeState:true };

let yawBuffer = []; let pitchBuffer = [];
function smooth(buffer, value, size = 5) {
    buffer.push(value); if (buffer.length > size) buffer.shift();
    return buffer.reduce((a, b) => a + b) / buffer.length;
}

function logEvent(msg) {
    const log = document.getElementById('eventLog');
    if (log.textContent.includes('Waiting')) log.innerHTML = '';
    const d = document.createElement('div');
    const elapsed = sessionStart ? Math.floor((Date.now() - sessionStart) / 1000) : 0;
    const timeStr = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
    d.innerHTML = `<span class="time">[${timeStr}]</span> ${msg}`;
    log.prepend(d);
}

function onFaceResults(results) {
    if (!sessionActive) return;
    stats.totalFrames++;
    currentFaceLandmarks = results.multiFaceLandmarks?.[0] || null;
    if (!currentFaceLandmarks) return;
    const lm = currentFaceLandmarks;

    const calcGaze = (iris, inPt, outPt) => {
        const center = { x: (inPt.x + outPt.x)/2, y: (inPt.y + outPt.y)/2 };
        return Math.sqrt(Math.pow(iris.x - center.x, 2) + Math.pow(iris.y - center.y, 2)) / Math.abs(outPt.x - inPt.x);
    };
    const gazeScore = (calcGaze(lm[468], lm[133], lm[33]) + calcGaze(lm[473], lm[362], lm[263])) / 2;
    const eyeOk = gazeScore < SENSITIVITY.gaze;

    const nose = lm[1], chin = lm[152], forehead = lm[10], lCheek = lm[234], rCheek = lm[454];
    const rawYaw = ((nose.x - (lCheek.x + rCheek.x)/2) / Math.abs(rCheek.x - lCheek.x)) * 100;
    const rawPitch = (((nose.y - (forehead.y + chin.y)/2) / Math.abs(chin.y - forehead.y)) + 0.05) * 100;
    
    const yaw = smooth(yawBuffer, rawYaw);
    const pitch = smooth(pitchBuffer, rawPitch);
    const headOk = Math.abs(yaw) < SENSITIVITY.yaw && Math.abs(pitch) < SENSITIVITY.pitch;

    if (eyeOk) stats.eyeOk++;
    if (headOk) stats.headOk++;

    if (!eyeOk && stats.lastEyeState && stats.totalFrames > 30) {
        stats.lookaways++;
        logEvent("Eye contact broken");
        document.getElementById('mLookaway').textContent = stats.lookaways;
    }
    stats.lastEyeState = eyeOk;

    document.getElementById('mEye').textContent = gazeScore.toFixed(3);
    document.getElementById('mEye').className = `metric-value ${eyeOk ? 'good' : 'bad'}`;
    document.getElementById('mYaw').textContent = `${Math.abs(yaw).toFixed(1)}°`;
    document.getElementById('mYaw').className = `metric-value ${headOk ? 'good' : 'bad'}`;
    document.getElementById('badgeEye').className = `badge ${eyeOk ? 'good' : 'bad'}`;
    document.getElementById('badgeEyeTxt').textContent = eyeOk ? "Eye Focus" : "Looking Away";
    document.getElementById('badgeHead').className = `badge ${headOk ? 'good' : 'bad'}`;
    document.getElementById('badgeHeadTxt').textContent = headOk ? "Head Centered" : "Head Turned";

    const ep = Math.round((stats.eyeOk/stats.totalFrames)*100);
    const hp = Math.round((stats.headOk/stats.totalFrames)*100);
    document.getElementById('barEye').style.width = ep + '%';
    document.getElementById('barHead').style.width = hp + '%';
}

let lastHandPos = null;
function onHandResults(results) {
    if (!sessionActive) return;
    currentHandLandmarks = results.multiHandLandmarks?.[0] || null;

    if (!currentHandLandmarks) {
        document.getElementById('mHand').textContent = "Not in frame";
        document.getElementById('mHand').className = "metric-value bad";
        document.getElementById('badgeHand').className = "badge bad";
        document.getElementById('badgeHandTxt').textContent = "Hands Hidden";
        lastHandPos = null;
        return;
    }

    const wrist = currentHandLandmarks[0];
    if (lastHandPos) {
        const dist = Math.sqrt(Math.pow(wrist.x - lastHandPos.x, 2) + Math.pow(wrist.y - lastHandPos.y, 2)) * 1000;
        const stable = dist < SENSITIVITY.handSpeedAllowed;
        document.getElementById('mHand').textContent = dist.toFixed(1);
        document.getElementById('mHand').className = `metric-value ${stable ? 'good' : 'bad'}`;
        document.getElementById('badgeHand').className = `badge ${stable ? 'good' : 'bad'}`;
        document.getElementById('badgeHandTxt').textContent = stable ? "Hands Stable" : "Hands Moving";
        if (stable) stats.handOk++;
    }
    lastHandPos = {x: wrist.x, y: wrist.y};

    const f = stats.totalFrames || 1;
    document.getElementById('barHand').style.width = Math.round((stats.handOk/f)*100) + '%';
}

function drawLoop() {
    if (!sessionActive) return;
    if (video.readyState >= 2) {
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        if (currentFaceLandmarks) {
            ctx.fillStyle = '#22c55e';
            [468, 473].forEach(i => {
                ctx.beginPath();
                ctx.arc(currentFaceLandmarks[i].x * canvas.width, currentFaceLandmarks[i].y * canvas.height, 4, 0, Math.PI*2);
                ctx.fill();
            });
        }
        if (currentHandLandmarks) {
            ctx.fillStyle = '#a78bfa';
            currentHandLandmarks.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x * canvas.width, p.y * canvas.height, 3, 0, Math.PI*2);
                ctx.fill();
            });
        }
    }
    animationId = requestAnimationFrame(drawLoop);
}

async function startSession() {
    try {
        document.getElementById('statusText').textContent = "Requesting camera...";
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1920 }, height: { ideal: 1080 } } });
        video.srcObject = stream;
        
        await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(); }; });

        document.getElementById('statusText').textContent = "Initializing AI Models...";
        sessionActive = true;
        sessionStart = Date.now();
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('overlayBadges').style.display = 'flex';
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('btnReport').disabled = true;
        document.getElementById('liveDot').classList.add('live');

        drawLoop();

        const fm = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        fm.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
        fm.onResults(onFaceResults);

        const h = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        h.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.4 });
        h.onResults(onHandResults);

        let isProcessing = false;
        aiProcessingInterval = setInterval(async () => {
            if (!sessionActive || isProcessing || video.readyState < 2) return;
            isProcessing = true;
            try { await fm.send({image: video}); await h.send({image: video});
                document.getElementById('statusText').textContent = "Live Tracking Active";
            } catch (err) {}
            isProcessing = false;
        }, 100);

        setInterval(() => {
            if (!sessionActive) return;
            const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
            document.getElementById('timer').textContent = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
        }, 1000);
    } catch (e) {
        document.getElementById('statusText').textContent = "Camera Error";
        alert("Camera access failed.");
    }
}

function stopSession() {
    sessionActive = false;
    cancelAnimationFrame(animationId);
    clearInterval(aiProcessingInterval);
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    document.getElementById('btnReport').disabled = false;
    document.getElementById('liveDot').classList.remove('live');
    document.getElementById('statusText').textContent = "Session Stopped";
    logEvent("Session Stopped");
}

// CALL FASTAPI BACKEND
async function generateReport() {
    const box = document.getElementById('reportBox');
    box.style.display = 'block';
    box.textContent = "Analyzing body language by AI...";

    const payload = {
        eyeScore: document.getElementById('barEye').style.width,
        headScore: document.getElementById('barHead').style.width,
        handScore: document.getElementById('barHand').style.width,
        lookaways: stats.lookaways,
        duration: document.getElementById('timer').textContent
    };

    try {
        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        if(!response.ok) throw new Error(data.detail || "Error generating report");

        // Convert markdown bold (**text**) to HTML <strong>text</strong>
        box.innerHTML = data.result
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');

    } catch (error) {
        box.textContent = "Error: " + error.message;
    }
}
</script>
</body>
</html>
